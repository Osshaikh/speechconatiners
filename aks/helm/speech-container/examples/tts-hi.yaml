mode: tts

image:
  # Voice: SwaraNeural (hi-IN female). Alternatives: madhurneural (M), aartineural (F)
  tag: 4.6.0-amd64-hi-in-swaraneural

resources:
  requests:
    cpu: "6"
    memory: "12Gi"
  limits:
    cpu: "8"
    memory: "16Gi"

concurrency:
  numberOfConcurrentRequest: 5

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  host: speech.bfl.internal
  path: /tts/hi-IN
