mode: tts

image:
  # Voice: SwaraNeural (hi-IN female). Alternatives: madhurneural (M), aartineural (F)
  tag: 4.6.0-amd64-hi-in-swaraneural

# Neural TTS minimum sizing per Microsoft Learn host-resource guidance.
# Limits inherit from chart values.yaml (8c / 16Gi).
resources:
  requests:
    cpu: "6"
    memory: "12Gi"

concurrency:
  numberOfConcurrentRequest: 6

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  host: speech.bfl.internal
  path: /tts/hi-IN

# ---- Pod scheduling: dedicated TTS nodepool ---------------------------------
# Expects nodes tainted workload=tts:NoSchedule and labeled workload=tts.
# Soft affinity = prefers TTS pool, falls back to any untainted node if TTS
# pool is unavailable. See tts-en.yaml for full rationale.
tolerations:
  - key: workload
    operator: Equal
    value: tts
    effect: NoSchedule

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: workload
              operator: In
              values: ["tts"]
