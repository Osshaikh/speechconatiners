mode: tts

image:
  # Voice: SwaraNeural (hi-IN female). Alternatives: madhurneural (M), aartineural (F)
  tag: 3.0.0-amd64-hi-in-swaraneural

resources:
  requests:
    cpu: "6"
    memory: "12Gi"
  limits:
    cpu: "8"
    memory: "16Gi"

concurrency:
  numberOfConcurrentRequest: 5

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

service:
  type: LoadBalancer
  port: 5000
