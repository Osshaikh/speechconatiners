mode: stt

image:
  tag: 5.3.0-amd64-en-us

# Inherits unified defaults from values.yaml: 8c / 8Gi req, 8c / 16Gi limit

concurrency:
  numberOfConcurrentRequest: 5

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  className: nginx
  host: speech.bfl.internal
  path: /stt/en-US
