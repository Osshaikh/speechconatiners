{{- if .Values.ingress.enabled -}}
{{- $svcName := include "speech-container.fullname" . -}}
{{- $svcPort := .Values.service.port | int -}}
{{- $path := .Values.ingress.path | required "ingress.path is required when ingress.enabled=true (e.g. /stt/en-US)" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svcName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "speech-container.labels" . | nindent 4 }}
  annotations:
    # --- Path rewrite: strip the language prefix before forwarding to container ---
    # Client hits  : /stt/en-US/speech/recognition/conversation/cognitiveservices/v1
    # Container sees:           /speech/recognition/conversation/cognitiveservices/v1
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    # --- WebSocket / long-lived call support (STT streams can run for minutes) ---
    nginx.ingress.kubernetes.io/proxy-read-timeout: {{ .Values.ingress.proxyReadTimeout | quote }}
    nginx.ingress.kubernetes.io/proxy-send-timeout: {{ .Values.ingress.proxySendTimeout | quote }}
    # --- Allow larger SSML / audio payloads for TTS ---
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.proxyBodySize | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | required "ingress.tls.secretName is required when ingress.tls.enabled=true" }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ printf "%s(/|$)(.*)" $path }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
{{- end }}
