apiVersion: v1
kind: Service
metadata:
  name: {{ include "speech-container.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "speech-container.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "speech-container.selectorLabels" . | nindent 4 }}
